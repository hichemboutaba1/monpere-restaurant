<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Père · Dashboard Chef</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--dark:#111;--charcoal:#1a1a1a;--smoke:#2a2a2a;--ash:#888;--bone:#c8c0b0;--cream:#e8e0d4;--white:#f5f0ea;--ember:#c4611a;--fire:#d4821e;--success:#2d7a4f;--error:#8b2020}
body{font-family:'Jost',sans-serif;background:var(--black);color:var(--cream);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--dark);border:1px solid rgba(196,97,26,.15);padding:3rem;max-width:400px;width:100%;text-align:center}
.login-box h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--white);margin-bottom:.5rem}
.login-box p{color:var(--ash);font-size:.85rem;margin-bottom:2rem}
.login-box input{width:100%;padding:.9rem 1rem;background:var(--charcoal);border:1px solid rgba(255,255,255,.08);color:var(--cream);font-family:'Jost',sans-serif;font-size:1rem;margin-bottom:1rem;outline:none;text-align:center;letter-spacing:.2em}
.login-box input:focus{border-color:var(--ember)}
.login-box button{width:100%;padding:.9rem;background:var(--ember);border:none;color:var(--black);font-family:'Jost',sans-serif;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .3s}
.login-box button:hover{background:var(--fire)}
.login-error{color:#e07070;font-size:.85rem;margin-top:1rem;display:none}
.dashboard{display:none;padding:2rem;max-width:1100px;margin:0 auto}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid rgba(196,97,26,.15)}
.dash-header h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--white)}
.dash-header button{padding:.5rem 1.2rem;background:transparent;border:1px solid var(--ash);color:var(--ash);font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .3s}
.dash-header button:hover{border-color:var(--ember);color:var(--ember)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--dark);border:1px solid rgba(255,255,255,.05);padding:1.5rem;text-align:center}
.stat-card .stat-num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--ember);font-weight:600}
.stat-card .stat-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ash);margin-top:.3rem}
.date-nav{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
.date-nav button{padding:.5rem 1rem;background:var(--charcoal);border:1px solid rgba(255,255,255,.08);color:var(--cream);font-family:'Jost',sans-serif;cursor:pointer;transition:all .3s}
.date-nav button:hover{border-color:var(--ember)}
.date-nav .current-date{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--white);min-width:200px;text-align:center}
.resa-table{width:100%;border-collapse:collapse}
.resa-table th{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ash);padding:1rem .8rem;text-align:left;border-bottom:1px solid rgba(196,97,26,.15)}
.resa-table td{padding:.9rem .8rem;font-size:.9rem;color:var(--bone);border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
.resa-table tr:hover td{background:rgba(196,97,26,.03)}
.badge{padding:.3rem .7rem;font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;border-radius:2px}
.badge-midi{background:rgba(184,150,62,.15);color:#b8963e}
.badge-soir{background:rgba(196,97,26,.15);color:var(--ember)}
.badge-confirmee{background:rgba(45,122,79,.15);color:#6fcf97}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--ash)}
.btn-delete{background:none;border:1px solid var(--error);color:#e07070;padding:.3rem .6rem;font-size:.7rem;cursor:pointer;font-family:'Jost',sans-serif;transition:all .3s}
.btn-delete:hover{background:var(--error);color:var(--white)}
@media(max-width:768px){
.stats{grid-template-columns:repeat(2,1fr)}
.resa-table{font-size:.8rem}
.resa-table th,.resa-table td{padding:.6rem .4rem}
.dash-header{flex-direction:column;gap:1rem;text-align:center}
.date-nav{flex-direction:column;gap:.5rem;text-align:center}
.date-nav button{width:100%}
}
@media(max-width:500px){
.stats{grid-template-columns:1fr 1fr;gap:.5rem}
.stat-card{padding:1rem}
.stat-card .stat-num{font-size:1.8rem}
.login-box{padding:2rem 1.5rem}
.resa-table{display:block;overflow-x:auto}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
<div class="login-box">
<h1>Mon Père</h1>
<p>Espace réservé au Chef</p>
<input type="password" id="loginPass" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')tryLogin()">
<button onclick="tryLogin()">Accéder au dashboard</button>
<p class="login-error" id="loginError">Mot de passe incorrect</p>
</div>
</div>

<div class="dashboard" id="dashboard">
<div class="dash-header">
<h1>Dashboard · Mon Père</h1>
<button onclick="logout()">Déconnexion</button>
</div>
<div class="stats">
<div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Réservations</div></div>
<div class="stat-card"><div class="stat-num" id="statCouverts">0</div><div class="stat-label">Couverts</div></div>
<div class="stat-card"><div class="stat-num" id="statMidi">0</div><div class="stat-label">Midi</div></div>
<div class="stat-card"><div class="stat-num" id="statSoir">0</div><div class="stat-label">Soir</div></div>
</div>
<div class="date-nav">
<button onclick="changeDate(-1)">&#8592; Veille</button>
<span class="current-date" id="currentDate"></span>
<button onclick="changeDate(1)">Lendemain &#8594;</button>
</div>
<table class="resa-table">
<thead><tr><th>Nom</th><th>Téléphone</th><th>Service</th><th>Couverts</th><th>Menu</th><th>Allergies</th><th>Statut</th><th></th></tr></thead>
<tbody id="resaBody"></tbody>
</table>
<div class="empty-state" id="emptyState" style="display:none"><p>Aucune réservation pour cette date</p></div>
</div>

<script>
// Password hash (SHA-256 of the admin password) - more secure than plain text
var ADMIN_HASH = '282d8637095031548e6ba506e915c7c10536b688f7688e853ab91103980023b7'; // Change this hash when updating password
async function hashPassword(pass) {
  var encoder = new TextEncoder();
  var data = encoder.encode(pass);
  var hashBuffer = await crypto.subtle.digest('SHA-256', data);
  var hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}
var CONFIG = {
  SUPABASE_URL: 'https://wnwirmlvgjfzymixswsy.supabase.co',
  SUPABASE_KEY: 'sb_publishable_stJAl676haRp9yEIIeZt8g_oLdd67LW'
};

var currentDate = new Date();
var supabaseClient = null;

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// Demo data
var demoData = [
  {nom:'Martin Dupont',telephone:'06 12 34 56 78',date_resa:todayStr(),service:'soir',couverts:2,menu:'7temps',allergies:'',statut:'confirmee'},
  {nom:'Sophie Laurent',telephone:'06 98 76 54 32',date_resa:todayStr(),service:'soir',couverts:4,menu:'7temps',allergies:'Sans gluten',statut:'confirmee'},
  {nom:'Pierre Moreau',telephone:'07 11 22 33 44',date_resa:todayStr(),service:'midi',couverts:3,menu:'5temps',allergies:'',statut:'confirmee'}
];

async function tryLogin() {
  var pass = document.getElementById('loginPass').value;
  var hash = await hashPassword(pass);
  if (hash === ADMIN_HASH) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    sessionStorage.setItem('adminAuth', 'true');
    loadReservations();
  } else {
    document.getElementById('loginError').style.display = 'block';
    setTimeout(function() { document.getElementById('loginError').style.display = 'none'; }, 3000);
  }
}
function logout() {
  sessionStorage.removeItem('adminAuth');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

// Auto-login if already authenticated in this session
if (sessionStorage.getItem('adminAuth') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadReservations();
}

// Escape HTML to prevent XSS
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function changeDate(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  loadReservations();
}

function formatDateDisplay(d) {
  var jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return jours[d.getDay()] + ' ' + d.getDate() + ' ' + mois[d.getMonth()] + ' ' + d.getFullYear();
}

function dateToStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

async function loadReservations() {
  document.getElementById('currentDate').textContent = formatDateDisplay(currentDate);
  var dateStr = dateToStr(currentDate);
  var reservations = [];

  if (CONFIG.SUPABASE_URL !== 'VOTRE_URL_SUPABASE_ICI' && supabaseClient) {
    try {
      var result = await supabaseClient
        .from('reservations')
        .select('*')
        .eq('date_resa', dateStr)
        .order('service', {ascending: true});
      if (result.error) throw result.error;
      reservations = result.data || [];
    } catch(e) {
      console.warn('Supabase indisponible, mode démo activé:', e.message || e);
      reservations = demoData.filter(function(r) { return r.date_resa === dateStr; });
    }
  } else {
    reservations = demoData.filter(function(r) { return r.date_resa === dateStr; });
  }
  renderTable(reservations);
}

function renderTable(data) {
  var body = document.getElementById('resaBody');
  var empty = document.getElementById('emptyState');
  if (data.length === 0) {
    body.innerHTML = '';
    empty.style.display = 'block';
    updateStats(data);
    return;
  }
  empty.style.display = 'none';
  var menuLabels = {'3temps':'3 Temps (32€)','5temps':'5 Temps (55€)','7temps':'7 Temps (65€)'};
  body.innerHTML = data.map(function(r, i) {
    return '<tr>' +
      '<td style="color:var(--white);font-weight:400">' + escapeHtml(r.nom) + '</td>' +
      '<td>' + escapeHtml(r.telephone) + '</td>' +
      '<td><span class="badge badge-' + r.service + '">' + (r.service === 'midi' ? 'Midi' : 'Soir') + '</span></td>' +
      '<td style="text-align:center;color:var(--white)">' + r.couverts + '</td>' +
      '<td>' + (menuLabels[r.menu] || 'Non précisé') + '</td>' +
      '<td>' + escapeHtml(r.allergies || 'Aucune') + '</td>' +
      '<td><span class="badge badge-confirmee">Confirmée</span></td>' +
      '<td><button class="btn-delete" onclick="deleteResa(' + i + ')">Annuler</button></td>' +
    '</tr>';
  }).join('');
  updateStats(data);
}

function updateStats(data) {
  var midi = data.filter(function(r) { return r.service === 'midi'; });
  var soir = data.filter(function(r) { return r.service === 'soir'; });
  document.getElementById('statTotal').textContent = data.length;
  document.getElementById('statCouverts').textContent = data.reduce(function(s,r) { return s + r.couverts; }, 0);
  document.getElementById('statMidi').textContent = midi.reduce(function(s,r) { return s + r.couverts; }, 0);
  document.getElementById('statSoir').textContent = soir.reduce(function(s,r) { return s + r.couverts; }, 0);
}

function deleteResa(index) {
  if (!confirm('Annuler cette réservation ?')) return;
  demoData.splice(index, 1);
  loadReservations();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);</script>
</body>
</html>
